<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grimoire Vault Clipper</title>
  <style>
    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d2b1f;
      color: #f4ede0;
    }
    h1 { margin: 0 0 12px; font-size: 14px; color: #d4b76a; letter-spacing: 0.1em; text-transform: uppercase; }
    label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #c9bfaf; margin: 8px 0 4px; }
    input, textarea, select {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: #f4ede0; padding: 8px 10px;
      border-radius: 6px; font-size: 13px;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #d4b76a; }
    textarea { resize: vertical; min-height: 56px; }
    button {
      cursor: pointer; border: none; padding: 8px 14px;
      border-radius: 999px; font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .primary { background: #f4ede0; color: #0d2b1f; }
    .primary:hover { background: #e8d8a8; }
    .ghost { background: transparent; color: #c9bfaf; border: 1px solid rgba(255,255,255,0.15); }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 12px; }
    .err { color: #ff8a8a; font-size: 11px; margin-top: 8px; }
    .ok { color: #9be59c; font-size: 11px; margin-top: 8px; }
    .hint { font-size: 10px; color: rgba(244,237,224,0.5); margin-top: 4px; }
    a { color: #d4b76a; }
  </style>
</head>
<body>
  <h1>Grimoire Clipper</h1>

  <div id="setup" style="display:none">
    <p style="font-size:12px;line-height:1.5;color:#c9bfaf;">
      Чтобы клипер работал, нужен личный API-токен.
    </p>
    <ol style="font-size:11px;line-height:1.6;color:#c9bfaf;padding-left:20px;">
      <li>Открой <a href="https://grimoire-vault.vercel.app/settings" target="_blank">Settings</a></li>
      <li>Создай токен в разделе «API-токены»</li>
      <li>Скопируй и вставь сюда:</li>
    </ol>
    <input id="token-input" placeholder="gv_pat_..." />
    <div class="row">
      <span class="hint">Хранится локально (chrome.storage)</span>
      <button class="primary" id="save-token">Сохранить</button>
    </div>
  </div>

  <div id="form" style="display:none">
    <label>Категория</label>
    <select id="category">
      <option value="web">02 · Web Resources</option>
      <option value="youtube">03 · YouTube</option>
      <option value="designs">05 · Designs</option>
      <option value="skills">07 · Skills</option>
      <option value="prompts">08 · Prompts</option>
      <option value="ideas">10 · Ideas</option>
      <option value="portfolio">11 · Active Projects</option>
      <option value="misc">12 · Misc</option>
    </select>

    <label>Название</label>
    <input id="title" />

    <label>Описание</label>
    <textarea id="description"></textarea>

    <label>Теги (через запятую)</label>
    <input id="tags" placeholder="frontend, важное" />

    <div class="row">
      <button class="ghost" id="reset-token">Сменить токен</button>
      <button class="primary" id="save">Сохранить</button>
    </div>

    <div id="status"></div>
  </div>
</body>
<script src="popup.js"></script>
</html>
